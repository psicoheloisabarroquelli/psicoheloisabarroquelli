<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psicóloga Heloisa Barroquelli</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg1:#efe7df;
      --bg2:#e2d7cd;
      --ink:#3b2f2a;
      --muted:#6b5c56;
      --glass: rgba(255,255,255,.55);
      --glass2: rgba(255,255,255,.35);
      --stroke: rgba(255,255,255,.55);
      --shadow: 0 18px 55px rgba(20, 10, 6, .18);
      --shadow2: 0 10px 26px rgba(20, 10, 6, .14);
      --radius: 22px;
    }

    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{height:100%;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      display:flex;
      justify-content:center;
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(255,255,255,.55), transparent 60%),
        radial-gradient(900px 600px at 80% 30%, rgba(255,255,255,.35), transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      position:relative;
      overflow-x:hidden;
    }

    /* textura de papel */
    body:before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("https://www.transparenttextures.com/patterns/paper.png");
      opacity:.35;
      pointer-events:none;
      mix-blend-mode:multiply;
    }

    /* brilho animado sutil no fundo */
    body:after{
      content:"";
      position:fixed;
      width:900px;
      height:900px;
      left:-240px;
      top:-220px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 60%);
      filter: blur(2px);
      opacity:.55;
      animation: drift 9s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes drift{
      0%,100%{ transform: translate(0,0) scale(1); }
      50%{ transform: translate(80px,60px) scale(1.05); }
    }

    .wrap{
      width:min(440px, 92vw);
      padding: 56px 0 48px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      position:relative;
    }

    .card{
      width:100%;
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 26px 22px 18px;
      position:relative;
      overflow:hidden;
      transform: translateY(14px);
      opacity:0;
      animation: in 900ms cubic-bezier(.2,.9,.2,1) forwards;
    }

    /* sheen (faixa de brilho) passando */
    .card:before{
      content:"";
      position:absolute;
      inset:-40%;
      background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,.55) 50%, transparent 65%);
      transform: translateX(-55%) rotate(8deg);
      animation: sheen 4.8s ease-in-out infinite;
      opacity:.35;
      pointer-events:none;
    }

    @keyframes sheen{
      0%,60%{ transform: translateX(-55%) rotate(8deg); }
      100%{ transform: translateX(55%) rotate(8deg); }
    }

    @keyframes in{
      to { transform: translateY(0); opacity:1; }
    }

    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:10px;
      padding-bottom: 12px;
    }

    .avatar{
      width:124px; height:124px;
      border-radius:50%;
      object-fit:cover;
      border: 6px solid rgba(255,255,255,.9);
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
      transform: translateY(-4px);
      animation: pop 900ms cubic-bezier(.2,.9,.2,1) 120ms both;
    }

    @keyframes pop{
      from{ transform: translateY(6px) scale(.96); opacity:0; }
      to{ transform: translateY(-4px) scale(1); opacity:1; }
    }

    h1{
      font-family: "Playfair Display", serif;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: .2px;
      font-weight: 600;
    }

    .bio{
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      padding: 0 10px;
    }

    .social{
      display:flex;
      justify-content:center;
      gap:14px;
      margin-top: 4px;
    }

    .iconbtn{
      width:44px; height:44px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      text-decoration:none;
      color: var(--ink);
      background: var(--glass2);
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: var(--shadow2);
      transition: transform .22s ease, background .22s ease;
      position:relative;
      overflow:hidden;
    }

    .iconbtn:hover{
      transform: translateY(-2px) scale(1.04);
      background: rgba(255,255,255,.8);
    }

    .iconbtn i{ font-size: 18px; }

    .links{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top: 10px;
      padding: 6px 4px 10px;
    }

    .btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      text-decoration:none;
      padding: 15px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: var(--shadow2);
      color: var(--ink);
      transition: transform .22s ease, background .22s ease, box-shadow .22s ease;
      position:relative;
      overflow:hidden;
    }

    .btn:before{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      transform: translateX(-120%);
      transition: transform .55s ease;
      opacity:.55;
    }

    .btn:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,.92);
      box-shadow: 0 14px 34px rgba(20,10,6,.16);
    }

    .btn:hover:before{
      transform: translateX(120%);
    }

    .btn .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .badge{
      width:36px; height:36px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      background: rgba(0,0,0,.04);
      border: 1px solid rgba(0,0,0,.06);
      flex: 0 0 auto;
    }

    .badge i{ font-size: 16px; color: var(--ink); }

    .label{
      font-weight: 600;
      font-size: 15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .text{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      min-width:0;
    }

    .arrow{
      width:34px; height:34px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(255,255,255,.55);
      transition: transform .22s ease;
      flex: 0 0 auto;
    }

    .btn:hover .arrow{
      transform: translateX(2px);
    }

    .footer{
      margin-top: 14px;
      color: rgba(90,70,64,.7);
      font-size: 12px;
      text-align:center;
      opacity:0;
      transform: translateY(8px);
      animation: footerIn 900ms ease 260ms forwards;
    }

    @keyframes footerIn{
      to{ opacity:1; transform: translateY(0); }
    }

    /* pequeno “pulse” no primeiro botão (opcional) */
    .btn.pulse{
      animation: pulse 2.4s ease-in-out 1.4s infinite;
    }
    @keyframes pulse{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-2px); }
    }

    /* acessibilidade */
    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; }
      body:after{ display:none; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <div class="top">
        <img class="avatar" src="foto.jpg" alt="Foto de Heloisa Barroquelli">
        <h1>Psicóloga Heloisa Barroquelli</h1>
        <p class="bio">Seja bem vindo(a) ✨</p>

        <nav class="social" aria-label="Redes sociais">
          <a class="iconbtn" href="" target="_blank" rel="noopener" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a class="iconbtn" href="" aria-label="E-mail">
            <i class="fa-solid fa-envelope"></i>
          </a>

          <a class="iconbtn" href="" target="_blank" rel="noopener" aria-label="WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
          </a>
        </nav>
      </div>

      <div class="links">
        <!-- [Não verificado] troque os href abaixo pelos links reais -->
        <a class="btn pulse" href="" target="_blank" rel="noopener">
          <span class="left">
            <span class="badge"><i class="fa-solid fa-clipboard-list"></i></span>
            <span class="text">
              <span class="label">Formulário de Interesse</span>
              <span class="sub">Psicoterapia Clínica</span>
            </span>
          </span>
          <span class="arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>
      </div>
          <a class="btn" href="" target="_blank" rel="noopener">
          <span class="left">
            <span class="badge"><i class="fa-solid fa-calendar-check"></i></span>
            <span class="text">
              <span class="label">Agendar consulta</span>
              <span class="sub">WhatsApp ou agenda online</span>
            </span>
          </span>
          <span class="arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>


      <div class="footer">© Heloisa Barroquelli</div>
    </section>
  </main>

  <script>
    // Micro detalhe premium: efeito “tilt” bem suave no card (desktop)
    const card = document.querySelector('.card');
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (!prefersReduced) {
      window.addEventListener('mousemove', (e) => {
        const r = card.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (e.clientX - cx) / r.width;
        const dy = (e.clientY - cy) / r.height;

        card.style.transform = `translateY(0) rotateX(${(-dy * 4).toFixed(2)}deg) rotateY(${(dx * 5).toFixed(2)}deg)`;
      });

      window.addEventListener('mouseleave', () => {
        card.style.transform = 'translateY(0) rotateX(0deg) rotateY(0deg)';
      });
    }
  </script>
</body>
</html>
